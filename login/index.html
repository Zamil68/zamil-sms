<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAMIL SMS — Login</title>
    <link rel="icon" type="image/x-icon" href="/branding/favicon.ico">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="login.css">
    <style>
        /* ZAMIL SMS — Beautiful Login Enhancements */
        #loginScreen {
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(8,145,178,.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 85% 90%, rgba(79,70,229,.06) 0%, transparent 60%),
                var(--bg);
        }
        
        .login-card {
            max-width: 420px;
            padding: 36px 32px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.04);
            border: 1px solid rgba(221,228,240,.8);
        }
        
        .login-brand {
            margin-bottom: 12px;
        }
        
        .login-logo-svg {
            height: 48px;
            width: auto;
        }
        
        .login-sub {
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 28px;
            font-weight: 500;
        }
        
        /* LaMix Network Badge */
        .lamix-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            background: linear-gradient(135deg, rgba(8,145,178,.08), rgba(79,70,229,.06));
            border: 1.5px solid rgba(8,145,178,.18);
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: .78rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .lamix-badge-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            color: #fff;
            font-weight: 700;
        }
        
        .field {
            margin-bottom: 16px;
        }
        
        .field label {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
            display: block;
        }
        
        .field input {
            padding: 13px 15px;
            font-size: .95rem;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            transition: all .15s;
        }
        
        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(8,145,178,.1);
        }
        
        .btn.btn-primary {
            width: 100%;
            padding: 14px;
            font-size: .95rem;
            border-radius: 12px;
            margin-top: 8px;
            font-weight: 700;
            letter-spacing: .02em;
        }
        
        .login-foot {
            margin-top: 20px;
            font-size: .72rem;
            color: var(--muted);
            text-align: center;
            font-weight: 500;
        }
        
        .login-foot::before {
            content: ' ';
        }
        
        @media(max-width: 480px) {
            .login-card {
                padding: 28px 24px 24px;
                border-radius: 20px;
            }
            
            .login-logo-svg {
                height: 42px;
            }
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-brand">
                <img src="/branding/logo-dark.png" alt="ZAMIL SMS" class="login-logo-svg header-logo-dark">
                <img src="/branding/logo-light.png" alt="ZAMIL SMS" class="login-logo-svg header-logo-light">
            </div>
            <div class="login-sub">Sign in to your account</div>

            <!-- LaMix Network Badge -->
            <div class="lamix-badge">
                <div class="lamix-badge-icon">⚡</div>
                <span>Connected to LaMix Network</span>
            </div>

            <div id="loginErr" class="err-box"></div>

            <div class="field">
                <label for="inpUser">Username</label>
                <input type="text" id="inpUser" autocomplete="username" placeholder="Enter your username">
            </div>

            <div class="field">
                <label for="inpPass">Password</label>
                <div class="pwd-wrap">
                    <input type="password" id="inpPass" autocomplete="current-password" placeholder="Enter your password">
                    <button type="button" class="pwd-toggle" onclick="var i=document.getElementById('inpPass');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'':'🙈';">👁</button>
                </div>
                <div id="capsHint" class="caps-hint">⚠ Caps Lock is ON</div>
            </div>

            <button id="btnLogin" class="btn btn-primary" onclick="doLogin()">
                <span id="loginSpinner" class="spinner" style="display:none"></span>
                <span id="loginBtnText">Sign In</span> →
            </button>

            <div class="login-foot">Encrypted · Your data is protected end-to-end</div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
        <div id="loadingText" class="loading-text">Loading…</div>
    </div>

    <script src="providers.js"></script>
    <script src="utils.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
   <script>
    // Safe Caps Lock detection
    document.getElementById('inpPass').addEventListener('keyup', function(e) {
        var isCaps = (e.getModifierState && e.getModifierState('CapsLock')) || false;
        document.getElementById('capsHint').classList.toggle('show', isCaps);
    });
</script>
</body>
</html>
